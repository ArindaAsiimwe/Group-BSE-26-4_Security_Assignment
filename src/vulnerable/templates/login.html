{% extends "base.html" %}
{% block title %}Login - 8TechBank{% endblock %}
{% block content %}
<div class="form-container">
    <div class="form-box">
        <h2>Login to 8TechBank</h2>
        {% if error %}<div class="error-message">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group password-group">
                <label for="password">Password:</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" required>
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                        <svg class="toggle-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="10" cy="10" r="3"></circle>
                        </svg>
                        <svg class="toggle-icon visible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="form-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <!-- <div class="test-credentials">
            <p><strong>Test Credentials:</strong></p>
            <ul>
                <li>admin / admin123</li>
                <li>user1 / user1pass</li>
                <li>user2 / user2pass</li>
            </ul>
        </div> -->
    </div>
</div>
<script>
    document.getElementById('togglePassword').addEventListener('click', function(e) {
        e.preventDefault();
        const passwordInput = document.getElementById('password');
        const visibleIcon = this.querySelector('.toggle-icon.visible');
        const hiddenIcon = this.querySelector('.toggle-icon.hidden');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            hiddenIcon.style.display = 'none';
            visibleIcon.style.display = 'block';
        } else {
            passwordInput.type = 'password';
            hiddenIcon.style.display = 'block';
            visibleIcon.style.display = 'none';
        }
    });
</script>
{% endblock %}
